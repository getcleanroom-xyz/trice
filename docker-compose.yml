services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: trice
      POSTGRES_PASSWORD: trice
      POSTGRES_DB: trice
    ports:
      - "5432:5432"
    volumes:
      - trice_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trice"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - trice_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - trice_web_node_modules:/app/node_modules
    env_file:
      - ./apps/web/.env.local
    environment:
      DATABASE_URL: postgres://trice:trice@postgres:5432/trice
      NEXT_PUBLIC_SERVICE_URL: http://localhost:4000
      WEB_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

  service:
    image: oven/bun:1
    working_dir: /app
    command: sh -c "bun install && bun run dev"
    ports:
      - "4000:4000"
    volumes:
      - ./apps/service:/app
      - trice_service_node_modules:/app/node_modules
    env_file:
      - ./apps/service/.env
    environment:
      DATABASE_URL: postgres://trice:trice@postgres:5432/trice
      REDIS_URL: redis://redis:6379
      WEB_URL: http://localhost:3000
      SERVICE_URL: http://localhost:4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: oven/bun:1
    working_dir: /app
    command: sh -c "bun install && bun run worker"
    volumes:
      - ./apps/service:/app
      - trice_service_node_modules:/app/node_modules
    env_file:
      - ./apps/service/.env
    environment:
      DATABASE_URL: postgres://trice:trice@postgres:5432/trice
      REDIS_URL: redis://redis:6379
      WEB_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  trice_postgres_data:
  trice_redis_data:
  trice_web_node_modules:
  trice_service_node_modules: