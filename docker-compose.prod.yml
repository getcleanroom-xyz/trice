services:
  web:
    build: ./apps/web
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:?err}
      NEXT_PUBLIC_SERVICE_URL: ${NEXT_PUBLIC_SERVICE_URL:?err}
      WEB_URL: ${WEB_URL:?err}
      RESEND_API_KEY: ${RESEND_API_KEY:?err}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?err}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:?err}

  service:
    build: ./apps/service
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: ${DATABASE_URL:?err}
      REDIS_URL: ${REDIS_URL:?err}
      WEB_URL: ${WEB_URL:?err}
      SERVICE_URL: ${SERVICE_URL:?err}
      RESEND_API_KEY: ${RESEND_API_KEY:?err}
      FLUTTERWAVE_SECRET_KEY: ${FLUTTERWAVE_SECRET_KEY:-}
      FLUTTERWAVE_WEBHOOK_SECRET: ${FLUTTERWAVE_WEBHOOK_SECRET:-}
      NOWPAYMENTS_API_KEY: ${NOWPAYMENTS_API_KEY:-}
      NOWPAYMENTS_IPN_SECRET: ${NOWPAYMENTS_IPN_SECRET:-}

  worker:
    build:
      context: ./apps/service
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?err}
      REDIS_URL: ${REDIS_URL:?err}
      WEB_URL: ${WEB_URL:?err}
      RESEND_API_KEY: ${RESEND_API_KEY:?err}
